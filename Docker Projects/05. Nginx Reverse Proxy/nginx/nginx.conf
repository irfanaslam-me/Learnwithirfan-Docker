events {
    worker_connections 1024;
}

http {
    # upstream block = the pool of app servers Nginx distributes to
    # "app" here is the Docker service name — Nginx uses Docker DNS to find all instances
    upstream app_servers {
        server app:3000;   # Docker resolves "app" to ALL scaled containers automatically
        # Default is round-robin: request 1 → instance 1, request 2 → instance 2, etc.

        # Alternative strategies (uncomment one to try):
        # least_conn;   # send to instance with fewest active connections
        # ip_hash;      # same client IP always goes to same instance (session sticky)
    }

    server {
        listen 80;

        location / {
            proxy_pass http://app_servers;

            # Forward the real client IP to the app
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
        }
    }
}
